# Investable universe for the weekly portfolio rebuild.
#
# weekly_run.py screens every ticker here through the 4-stage funnel and
# constructs the five risk-tiered model portfolios from the survivors.
#
# Edit freely — add tickers, remove ones you don't want, or reorganize.
# The weekly funnel handles any list size; larger lists take longer to run.
#
# Default: ~150 large- and mid-cap names across all 11 GICS sectors.
# Source: S&P 500 constituents as of 2025-05 (representative subset).
# Run weekly_run.py to automatically fetch the full S&P 500 from Wikipedia
# if this file is deleted or if you prefer a live list.

